<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Seecret — Чат</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/chat.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

    <!-- Видео фон -->
    <div class="video-bg">
        <video id="video-woman" autoplay muted loop playsinline>
            <source src="assets/video/woman.mp4" type="video/mp4">
        </video>
        <video id="video-man" autoplay muted loop playsinline>
            <source src="assets/video/man.mp4" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
    </div>
    <div class="app">
        <!-- Шапка чата -->
        <div class="chat-page-header">
            <button class="back-btn" onclick="goBack()">←</button>
            <div class="chat-user-info" onclick="openUserProfile()">
                <div class="chat-user-avatar" id="chat-avatar">👤</div>
                <div>
                    <h3 id="chat-username">Загрузка...</h3>
                    <span class="online" id="chat-status">● онлайн</span>
                </div>
            </div>
            <button class="icon-btn" onclick="showChatMenu()">⋮</button>
        </div>

        <!-- Сообщения -->
        <div class="chat-page-messages" id="chat-messages">
            <div class="chat-date-divider">Сегодня</div>
        </div>

        <!-- Премиум блок (если нет подписки) -->
        <div class="premium-block hidden" id="premium-block">
            <div class="premium-block-content">
                <span>🔒</span>
                <p>Оформи подписку чтобы писать сообщения</p>
                <button class="btn-primary" onclick="showPremium()">
                    Открыть доступ 💎
                </button>
            </div>
        </div>
        <!-- Инпут -->
        <div class="chat-page-input" id="chat-input-area">
            <button class="media-btn" onclick="sendMedia()">📎</button>
            <input type="text" id="message-input" placeholder="Напиши сообщение..." onkeypress="handleEnter(event)">
            <button class="send-btn" onclick="sendMessage()">→</button>
        </div>

        <!-- Меню чата -->
        <div class="chat-menu hidden" id="chat-menu">
            <div class="chat-menu-item" onclick="viewProfile()">
                👤 Посмотреть профиль
            </div>
            <div class="chat-menu-item" onclick="addToFavorites()">
                ❤️ В избранное
            </div>
            <div class="chat-menu-item danger" onclick="blockUser()">
                🚫 Заблокировать
            </div>
        </div>
    </div>

    <input type="file" id="media-input" accept="image/*,video/*" style="display:none"
        onchange="handleMediaUpload(this)">

    <script src="js/telegram.js"></script>
    <script src="js/api.js"></script>
    <script src="js/chat.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sx7</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

    <div class="app" id="app">

        <!-- Шапка -->
        <div class="header">
            <div class="header-logo">Sx7</div>
            <div class="header-actions">
                <button class="icon-btn" onclick="showTab('tab-messages')">
                    💌
                    <span class="badge-count" id="msg-badge" style="display:none">0</span>
                </button>
                <button class="icon-btn" onclick="showTab('tab-profile')">👤</button>
            </div>
        </div>

        <!-- Контент -->
        <div class="content">

            <!-- Карта -->
            <div class="tab-content active" id="tab-map">
                <div id="map"></div>
                <div class="map-btns">
                    <button class="map-btn" onclick="centerMap()">📍</button>
                </div>
            </div>

            <!-- Поиск -->
            <div class="tab-content" id="tab-search" style="display:none;">
                <div class="search-header">
                    <h2>для тебя 🔥</h2>
                    <button class="filter-btn" onclick="showFilters()">⚙️</button>
                </div>
                <div class="cards-stack" id="cards-stack">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>ищем твоих...</p>
                    </div>
                </div>
                <div class="action-btns">
                    <button class="action-btn dislike" onclick="handleDislike()">👎</button>
                    <button class="action-btn super" onclick="handleSuper()">❤️</button>
                    <button class="action-btn like" onclick="handleLike()">👍</button>
                </div>
            </div>

            <!-- Истории -->
            <div class="tab-content" id="tab-stories" style="display:none;">
                <div class="search-header">
                    <h2>истории 📸</h2>
                    <button class="filter-btn" onclick="addStory()">+ добавить</button>
                </div>
                <div class="empty-state">
                    <div class="empty-icon">📸</div>
                    <p>историй нет</p>
                    <span>добавь свою!</span>
                </div>
            </div>

            <!-- Сообщения -->
            <div class="tab-content" id="tab-messages" style="display:none;">
                <div class="search-header">
                    <h2>сообщения 💌</h2>
                </div>
                <div class="messages-list" id="messages-list">
                    <div class="empty-state">
                        <div class="empty-icon">💌</div>
                        <p>пока пусто</p>
                        <span>найди своих и начни общаться!</span>
                    </div>
                </div>
            </div>

            <!-- Профиль -->
            <div class="tab-content" id="tab-profile" style="display:none;">
                <div class="profile-header">
                    <div class="profile-avatar" id="profile-avatar">👤</div>
                    <div class="profile-info">
                        <h2 id="profile-nick">загрузка...</h2>
                        <p id="profile-city">...</p>
                    </div>
                    <button class="edit-btn" onclick="editProfile()">✏️</button>
                </div>

                <div class="profile-stats">
                    <div class="stat">
                        <span class="stat-num">0</span>
                        <span class="stat-label">лайков</span>
                    </div>
                    <div class="stat">
                        <span class="stat-num">0</span>
                        <span class="stat-label">мэтчей</span>
                    </div>
                    <div class="stat">
                        <span class="stat-num">0</span>
                        <span class="stat-label">просмотров</span>
                    </div>
                </div>

                <div class="profile-media">
                    <h3>мои фото и видео</h3>
                    <div class="media-grid" id="profile-media-grid">
                        <div class="add-media" onclick="addMedia()">
                            <span>+</span>
                            <p>добавить</p>
                        </div>
                    </div>
                </div>

                <div class="subscription-card">
                    <span class="sub-icon">😈</span>
                    <div class="sub-info">
                        <h3>бесплатный план</h3>
                        <p>улучши для полного доступа</p>
                    </div>
                    <button class="upgrade-btn" onclick="showPremium()">апгрейд 🔥</button>
                </div>

                <button class="btn-danger" onclick="logout()">выйти</button>
            </div>

        </div>

        <!-- Нижняя навигация -->
        <div class="bottom-nav">
            <button class="nav-btn active" id="nav-map" onclick="showTab('tab-map')">
                <span>🗺️</span>
                <p>карта</p>
            </button>
            <button class="nav-btn" id="nav-search" onclick="showTab('tab-search')">
                <span>👥</span>
                <p>поиск</p>
            </button>
            <button class="nav-btn" id="nav-stories" onclick="showTab('tab-stories')">
                <span>📸</span>
                <p>истории</p>
            </button>
            <button class="nav-btn" id="nav-messages" onclick="showTab('tab-messages')">
                <span>💌</span>
                <p>чаты</p>
            </button>
            <button class="nav-btn" id="nav-profile" onclick="showTab('tab-profile')">
                <span>👤</span>
                <p>профиль</p>
            </button>
        </div>

    </div>

    <script src="js/telegram.js"></script>
    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
</body>

</html>
